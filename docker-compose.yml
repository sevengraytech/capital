services:
  api:
    build:
      context: .
    image: strongnodecapitals:local
    container_name: cryptovault_api
    ports:
      - "8081:8080"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    volumes:
      - cryptovault_db:/app/data
      - ./frontend/uploads:/app/frontend/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/cryptovault.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "1"]

volumes:
  cryptovault_db:
    driver: local
